<!DOCTYPE html>
<!--Use of Manus (https://manus.im/app) for first code generation-->
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traducteur Morse Interactif</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c3e50; }
        .section { margin-bottom: 30px; }
        h2 { font-size: 1.2rem; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        
        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            resize: none;
            box-sizing: border-box;
            margin-top: 10px;
        }

        .tap-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        #tap-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background-color: #3498db;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
        }

        #tap-button:active, #tap-button.active {
            transform: scale(0.95);
            background-color: #2980b9;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button.action-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            background-color: #95a5a6;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
        }

        button.action-btn:hover { background-color: #7f8c8d; }
        .clear-btn { background-color: #e74c3c !important; }
        .clear-btn:hover { background-color: #c0392b !important; }

        .hint { font-size: 0.85rem; color: #7f8c8d; text-align: center; margin-top: 5px; }


        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
        }

        td, th {
            padding: 5px;
            text-align: left;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Traducteur Morse</h1>

        <!-- Morse vers Texte -->
        <div class="section">
            <h2>Morse vers Texte</h2>
            <textarea id="morse-input-area" placeholder="Code Morse saisi..." readonly></textarea>
            <textarea id="text-output" placeholder="Traduction en texte..." readonly></textarea>
            
            <div class="tap-area">
                <button id="tap-button">CLIQUER ICI</button>
                <p class="hint">Clic court = . | Clic long = -</p>
                
                <div class="controls">
                    <button class="action-btn" id="btn-space-char">Espace Lettre</button>
                    <button class="action-btn" id="btn-space-word">Espace Mot (/)</button>
                    <button class="action-btn clear-btn" id="btn-clear-morse">Effacer</button>
                </div>
            </div>
        </div>

        <hr>

        <!-- Texte vers Morse -->
        <div class="section">
            <h2>Texte vers Morse</h2>
            <textarea id="text-input" placeholder="Tapez votre texte ici..."></textarea>
            <textarea id="morse-output" placeholder="Traduction en Morse..." readonly></textarea>
        </div>
        <div >
            <h2>Table Morse</h2>
            <table id="tabMorse">
                <tr><th>Alphabete</th><th>Morse</th></tr>

            </table>
        </div>
    </div>

    <script src="js/morse.js"></script>
</body>
</html>
